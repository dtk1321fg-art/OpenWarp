<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenWarp traversable wormhole research poster with formulas">
  <defs>
    <radialGradient id="space" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#172b5f"/>
      <stop offset="45%" stop-color="#050b1f"/>
      <stop offset="100%" stop-color="#01030a"/>
    </radialGradient>
    <radialGradient id="mouth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="22%" stop-color="#7df9ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#5f7cff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#10081f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tube" x1="360" y1="0" x2="1240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7df9ff" stop-opacity="0.15"/>
      <stop offset="20%" stop-color="#74a6ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#d8e8ff" stop-opacity="0.80"/>
      <stop offset="80%" stop-color="#8a6dff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7df9ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font-family:Orbitron,Arial,sans-serif;font-weight:800;letter-spacing:4px;fill:#f4fbff;filter:url(#glow)}
      .subtitle{font-family:Arial,sans-serif;font-weight:700;letter-spacing:10px;fill:#6eefff}
      .label{font-family:Arial,sans-serif;font-weight:700;letter-spacing:3px;fill:#78f7ff}
      .math{font-family:Georgia,'Times New Roman',serif;fill:#ffffff}
      .small{font-family:Arial,sans-serif;fill:#bdefff}
      .panel{fill:#031327;stroke:#39dfff;stroke-width:2;opacity:.92}
      .line{stroke:#59efff;stroke-width:2;fill:none;opacity:.75}
      .thin{stroke:#7df9ff;stroke-width:1;fill:none;opacity:.35}
      .dash{stroke:#e9fbff;stroke-width:2;stroke-dasharray:10 10;fill:none;opacity:.85}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#space)"/>

  <!-- stars -->
  <g opacity="0.9">
    <circle cx="86" cy="115" r="1.6" fill="#fff"/><circle cx="143" cy="388" r="1.2" fill="#8befff"/><circle cx="226" cy="67" r="1.5" fill="#fff"/><circle cx="309" cy="784" r="1.4" fill="#fff"/><circle cx="410" cy="159" r="1.2" fill="#8befff"/><circle cx="534" cy="78" r="1.7" fill="#fff"/><circle cx="686" cy="826" r="1.3" fill="#fff"/><circle cx="744" cy="164" r="1.5" fill="#fff"/><circle cx="901" cy="112" r="1.3" fill="#8befff"/><circle cx="1068" cy="768" r="1.5" fill="#fff"/><circle cx="1230" cy="129" r="1.7" fill="#fff"/><circle cx="1382" cy="352" r="1.3" fill="#8befff"/><circle cx="1510" cy="72" r="1.5" fill="#fff"/><circle cx="1474" cy="826" r="1.4" fill="#fff"/>
    <circle cx="96" cy="712" r="2.8" fill="#fff" filter="url(#glow)"/><circle cx="1335" cy="708" r="2.6" fill="#7df9ff" filter="url(#glow)"/><circle cx="1530" cy="445" r="2.4" fill="#fff" filter="url(#glow)"/>
  </g>

  <!-- title -->
  <text x="800" y="92" font-size="86" text-anchor="middle" class="title">OpenWarp</text>
  <text x="800" y="138" font-size="23" text-anchor="middle" class="subtitle">TRAVERSABLE WORMHOLE RESEARCH</text>
  <path d="M560 158 H1040" class="line"/><circle cx="800" cy="158" r="4" fill="#7df9ff"/>

  <!-- wormhole tunnel -->
  <path d="M350 430 C470 295, 650 355, 800 410 C950 355, 1130 295, 1250 430 C1130 565, 950 505, 800 450 C650 505, 470 565, 350 430 Z" fill="url(#tube)" stroke="#8defff" stroke-width="3" filter="url(#softGlow)"/>
  <path d="M350 430 C500 350, 645 388, 800 430 C955 388, 1100 350, 1250 430" class="thin"/>
  <path d="M350 430 C500 510, 645 472, 800 430 C955 472, 1100 510, 1250 430" class="thin"/>
  <path d="M410 390 C570 410, 660 420, 800 430 C940 420, 1030 410, 1190 390" class="thin"/>
  <path d="M410 470 C570 450, 660 440, 800 430 C940 440, 1030 450, 1190 470" class="thin"/>

  <!-- mouths -->
  <ellipse cx="350" cy="430" rx="105" ry="205" fill="none" stroke="#7df9ff" stroke-width="7" filter="url(#glow)"/>
  <ellipse cx="350" cy="430" rx="72" ry="160" fill="none" stroke="#9d8cff" stroke-width="3" opacity="0.8"/>
  <ellipse cx="350" cy="430" rx="130" ry="240" fill="url(#mouth)" opacity="0.25" filter="url(#softGlow)"/>
  <ellipse cx="1250" cy="430" rx="105" ry="205" fill="none" stroke="#7df9ff" stroke-width="7" filter="url(#glow)"/>
  <ellipse cx="1250" cy="430" rx="72" ry="160" fill="none" stroke="#9d8cff" stroke-width="3" opacity="0.8"/>
  <ellipse cx="1250" cy="430" rx="130" ry="240" fill="url(#mouth)" opacity="0.25" filter="url(#softGlow)"/>

  <!-- main metric panel -->
  <rect x="470" y="175" width="660" height="128" rx="18" class="panel"/>
  <text x="800" y="205" text-anchor="middle" font-size="18" class="label">MAIN METRIC</text>
  <text x="800" y="262" text-anchor="middle" font-size="38" class="math">ds² = -e²Φ(r)c²dt² + dr²/(1-b(r)/r) + r²dΩ²</text>

  <!-- conditions panel -->
  <rect x="42" y="340" width="306" height="210" rx="20" class="panel"/>
  <text x="190" y="318" text-anchor="middle" font-size="22" class="label">CONDITIONS</text>
  <text x="84" y="398" font-size="32" class="math">b(r₀) = r₀</text>
  <text x="84" y="463" font-size="32" class="math">b′(r₀) &lt; 1</text>
  <text x="84" y="528" font-size="32" class="math">Φ(r) finite</text>
  <path d="M348 445 H455" class="line"/>

  <!-- energy density -->
  <rect x="1255" y="300" width="300" height="110" rx="18" class="panel"/>
  <text x="1405" y="270" text-anchor="middle" font-size="21" class="label">ENERGY DENSITY</text>
  <text x="1405" y="366" text-anchor="middle" font-size="29" class="math">ρ(r₀) = - c⁴/(8πGr₀²)</text>
  <path d="M1255 355 H1165" class="line"/>

  <!-- travel times -->
  <rect x="1260" y="495" width="312" height="225" rx="18" class="panel"/>
  <text x="1416" y="468" text-anchor="middle" font-size="21" class="label">TRAVEL TIMES</text>
  <text x="1310" y="555" font-size="28" class="math">T_normal = D/c</text>
  <text x="1310" y="620" font-size="28" class="math">T_wormhole = L_throat/c</text>
  <text x="1310" y="685" font-size="24" class="math">Shortcut = D/L_throat</text>

  <!-- bottom distance diagram -->
  <circle cx="510" cy="725" r="6" fill="#7df9ff" filter="url(#glow)"/>
  <circle cx="1090" cy="725" r="6" fill="#7df9ff" filter="url(#glow)"/>
  <text x="488" y="715" font-size="28" class="math">A</text>
  <text x="1110" y="715" font-size="28" class="math">B</text>
  <path d="M520 725 H1080" class="dash"/>
  <text x="800" y="705" text-anchor="middle" font-size="32" class="math">D</text>
  <path d="M520 745 C620 815, 720 810, 800 765 C880 810, 980 815, 1080 745" class="line"/>
  <path d="M730 795 C760 775, 840 775, 870 795" stroke="#7df9ff" stroke-width="4" fill="none"/>
  <text x="800" y="840" text-anchor="middle" font-size="27" class="math">L_throat</text>

  <!-- bottom note -->
  <rect x="470" y="805" width="660" height="48" rx="16" fill="#04172c" stroke="#39dfff" stroke-width="2" opacity=".92"/>
  <text x="800" y="837" text-anchor="middle" font-size="20" class="label">MICROSCOPIC STABILIZABLE THROAT FIRST</text>

  <!-- footer -->
  <text x="60" y="850" font-size="18" class="small">OPEN SOURCE FOR THE FRONTIERS OF PHYSICS</text>
  <text x="1320" y="850" font-size="20" class="small">github.com/dtk1321fg-art/OpenWarp</text>
</svg>
